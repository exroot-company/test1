<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sito in Costruzione | Stiamo Arrivando</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Importazione di un font elegante e geometrico */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&display=swap');

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #fcfcfc;
            overflow-x: hidden;
        }

        /* --- Animazioni Sfere Fluttuanti --- */
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.6;
            animation: float-blob 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        .blob-1 {
            top: -10%; left: -10%;
            width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(255,183,178,1) 0%, rgba(255,226,226,0) 70%);
            animation-delay: 0s;
        }

        .blob-2 {
            bottom: -20%; right: -10%;
            width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(181,198,255,1) 0%, rgba(226,233,255,0) 70%);
            animation-delay: -5s;
        }

        .blob-3 {
            top: 40%; left: 40%;
            width: 40vw; height: 40vw;
            background: radial-gradient(circle, rgba(255,236,179,1) 0%, rgba(255,248,225,0) 70%);
            animation-delay: -10s;
        }

        @keyframes float-blob {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(5%, 10%) scale(1.1); }
            66% { transform: translate(-5%, 5%) scale(0.9); }
            100% { transform: translate(0, -10%) scale(1.05); }
        }

        /* --- Effetto Vetro (Glassmorphism) --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 
                0 4px 24px -1px rgba(0, 0, 0, 0.04),
                0 10px 40px -10px rgba(0, 0, 0, 0.04),
                inset 0 0 0 1px rgba(255, 255, 255, 0.5);
        }

        /* --- Animazioni di Entrata --- */
        .fade-in-up {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
    </style>
</head>
<body class="relative min-h-screen flex flex-col items-center justify-center text-slate-800 selection:bg-indigo-100 selection:text-indigo-900">

    <!-- Sfondi Animati -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Contenitore Principale -->
    <main class="relative z-10 w-full max-w-4xl px-4 sm:px-6 lg:px-8 py-12 flex flex-col items-center justify-center min-h-screen">

        <!-- Glass Card Centrale -->
        <div class="glass-panel rounded-[2rem] sm:rounded-[3rem] p-8 sm:p-12 md:p-16 w-full text-center fade-in-up delay-100">
            
            <!-- Badge -->
            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/80 border border-slate-100 shadow-sm mb-8">
                <span class="relative flex h-2.5 w-2.5">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-indigo-500"></span>
                </span>
                <span class="text-xs font-bold uppercase tracking-widest text-slate-500">Lancio Imminente</span>
            </div>

            <!-- Titolo Principale -->
            <h1 class="text-4xl sm:text-5xl md:text-6xl font-extrabold tracking-tight mb-6 leading-tight text-slate-900 fade-in-up delay-200">
                Stiamo creando <br class="hidden sm:block"/> qualcosa di <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-rose-400">straordinario.</span>
            </h1>

            <!-- Sottotitolo -->
            <p class="text-lg sm:text-xl text-slate-500 max-w-2xl mx-auto font-light leading-relaxed fade-in-up delay-300">
                Il nostro nuovo sito web è attualmente in fase di realizzazione. <br class="hidden sm:block"/>Torna a trovarci presto per scoprire tutte le novità.
            </p>

        </div>

    </main>

</body>
</html>
