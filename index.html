<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sito in Costruzione | Opalescent Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Un font molto elegante e moderno, perfetto per design "editoriali" */
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap');

        body, html {
            margin: 0; padding: 0;
            background-color: #ffffff;
            overflow: hidden;
            touch-action: none;
            cursor: crosshair; /* Cursore minimale a croce */
        }

        h1, h2, .font-syne { font-family: 'Syne', sans-serif; }
        p, span, .font-inter { font-family: 'Inter', sans-serif; }

        /* --- Sfondo a Grana Fotografica (Noise) --- */
        .noise-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 999;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            animation: noise-shift 0.2s infinite;
        }

        @keyframes noise-shift {
            0% { transform: translate(0,0); }
            50% { transform: translate(1%, 1%); }
            100% { transform: translate(-1%, -1%); }
        }

        /* --- Canvas Scia Liquida --- */
        #fluid-canvas {
            position: fixed;
            inset: 0;
            z-index: 5;
            pointer-events: none;
            mix-blend-mode: multiply;
        }

        /* --- Sfondi Opalescenti Reattivi --- */
        .blob {
            position: absolute;
            filter: blur(90px);
            z-index: 1;
            border-radius: 50%;
            transition: transform 1s cubic-bezier(0.1, 0.8, 0.2, 1);
            will-change: transform;
            opacity: 0.6;
        }

        .blob-1 { width: 50vw; height: 50vw; background: #ffc2e2; top: -10%; left: -10%; } /* Rosa perla */
        .blob-2 { width: 60vw; height: 60vw; background: #c2e0ff; bottom: -20%; right: -10%; } /* Azzurro ghiaccio */
        .blob-3 { width: 40vw; height: 40vw; background: #e0ffc2; top: 40%; left: 40%; } /* Verde menta tenue */

        /* --- Vetro di Cristallo (Ultra Pulito) --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(40px) saturate(140%);
            -webkit-backdrop-filter: blur(40px) saturate(140%);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 
                0 20px 50px -10px rgba(0, 0, 0, 0.05),
                inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            position: relative;
            transform-style: preserve-3d;
            border-radius: 3rem;
        }

        /* Glare morbido e diffuso */
        .glass-glare {
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: radial-gradient(circle at var(--glare-x, 50%) var(--glare-y, 50%), rgba(255,255,255,0.8) 0%, transparent 70%);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
            z-index: 2;
        }

        .parallax-item {
            transform: translateZ(var(--tz, 30px));
            position: relative;
            z-index: 10;
        }

        /* --- Testo Animato Opalescente --- */
        .iridescent-text {
            background: linear-gradient(110deg, #9ca3af 0%, #cbd5e1 20%, #f87171 40%, #818cf8 60%, #34d399 80%, #9ca3af 100%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shine 6s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* --- Lettere "Scacciate" dal mouse --- */
        .repel-word { display: inline-block; white-space: nowrap; }
        .repel-letter {
            display: inline-block;
            will-change: transform;
            cursor: default;
        }

        /* --- Animazione Entrata --- */
        .fade-in-up {
            opacity: 0;
            transform: translateY(40px);
            animation: fadeInUp 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        .delay-100 { animation-delay: 100ms; }

        /* Badge Ripple Infinito */
        .badge-ping {
            animation: soft-ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
        @keyframes soft-ping {
            75%, 100% { transform: scale(2); opacity: 0; }
        }
    </style>
</head>
<body class="text-slate-900 selection:bg-slate-200 selection:text-slate-900">

    <!-- Overlay Grana Pellicola -->
    <div class="noise-overlay"></div>

    <!-- Canvas per la scia interattiva -->
    <canvas id="fluid-canvas"></canvas>

    <!-- Sfondi Blob -->
    <div class="fixed inset-0 pointer-events-none">
        <div class="blob blob-1" id="b1" data-speed="0.03"></div>
        <div class="blob blob-2" id="b2" data-speed="0.04"></div>
        <div class="blob blob-3" id="b3" data-speed="0.02"></div>
    </div>

    <!-- Contenitore Principale -->
    <main class="relative z-10 w-full max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex flex-col items-center justify-center min-h-screen perspective-[1500px]">

        <div class="w-full fade-in-up delay-100 transform-style-3d">
            <!-- Glass Card -->
            <div id="tilt-card" class="glass-panel p-8 sm:p-14 md:p-20 w-full text-center group">
                
                <div class="glass-glare" id="glare"></div>

                <div class="parallax-item" style="--tz: 60px;">
                    <!-- Badge -->
                    <div class="inline-flex items-center gap-3 px-5 py-2.5 rounded-full bg-white/60 border border-white/80 shadow-[0_4px_12px_rgba(0,0,0,0.02)] mb-10 backdrop-blur-md">
                        <span class="relative flex h-2 w-2">
                            <span class="badge-ping absolute inline-flex h-full w-full rounded-full bg-slate-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-slate-800"></span>
                        </span>
                        <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-800 font-inter">Esperienza Inedita</span>
                    </div>
                </div>

                <div class="parallax-item" style="--tz: 100px;">
                    <!-- Titolo (verrà diviso in lettere da JS) -->
                    <h1 id="dynamic-title" class="text-5xl sm:text-6xl md:text-7xl lg:text-8xl font-syne font-bold tracking-tight mb-8 leading-[1.05]">
                        Stiamo plasmando <br class="hidden sm:block"/> l'<span class="iridescent-text">inimmaginabile.</span>
                    </h1>
                </div>

                <div class="parallax-item" style="--tz: 40px;">
                    <!-- Sottotitolo -->
                    <p class="text-lg sm:text-2xl text-slate-500 max-w-2xl mx-auto font-inter font-light leading-relaxed">
                        Un nuovo livello di estetica digitale sta per essere svelato. <br class="hidden sm:block"/>L'attesa è quasi finita.
                    </p>
                </div>

            </div>
        </div>

    </main>

    <script>
        // --- 1. SETUP VARIABILI ---
        const tiltCard = document.getElementById('tilt-card');
        const glare = document.getElementById('glare');
        const blobs = [document.getElementById('b1'), document.getElementById('b2'), document.getElementById('b3')];
        const lerp = (start, end, factor) => start + (end - start) * factor;
        
        let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        let isHoveringCard = false;

        // Tracciamento Mouse / Touch
        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('touchmove', (e) => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });

        // --- 2. CANVAS FLUID TRAIL (SCIA LIQUIDA) ---
        const canvas = document.getElementById('fluid-canvas');
        const ctx = canvas.getContext('2d');
        let trails = [];
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        window.addEventListener('mousemove', (e) => {
            trails.push({ x: e.clientX, y: e.clientY, age: 0, life: 60 });
        });

        function drawTrail() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (trails.length > 1) {
                ctx.beginPath();
                ctx.moveTo(trails[0].x, trails[0].y);
                
                for (let i = 1; i < trails.length; i++) {
                    const p = trails[i];
                    // Curva di Bezier per rendere la linea fluida
                    const xc = (trails[i - 1].x + p.x) / 2;
                    const yc = (trails[i - 1].y + p.y) / 2;
                    ctx.quadraticCurveTo(trails[i - 1].x, trails[i - 1].y, xc, yc);
                }

                // Stile della scia (gradiente che svanisce)
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                // Creiamo un gradiente basato sulla lunghezza della scia
                const gradient = ctx.createLinearGradient(
                    trails[0].x, trails[0].y, 
                    trails[trails.length-1].x, trails[trails.length-1].y
                );
                gradient.addColorStop(0, 'rgba(203, 213, 225, 0)'); // Trasparente inizio
                gradient.addColorStop(1, 'rgba(167, 139, 250, 0.4)'); // Lilla scuro fine
                
                ctx.strokeStyle = gradient;
                ctx.lineWidth = 40; // Spessore della scia
                ctx.stroke();
            }

            // Invecchia e rimuove i punti
            for (let i = trails.length - 1; i >= 0; i--) {
                trails[i].age++;
                if (trails[i].age > trails[i].life) {
                    trails.splice(i, 1);
                }
            }
        }

        // --- 3. TESTO CHE SCAPPA DAL MOUSE (TUTTE LE LETTERE) ---
        const titleEl = document.getElementById('dynamic-title');
        
        // Funzione per splittare i text node senza rompere i tag <span> interni (come quello iridescente)
        function splitTextIntoSpans(element) {
            const children = Array.from(element.childNodes);
            element.innerHTML = '';
            
            children.forEach(node => {
                if (node.nodeType === 3) { // Text node
                    const text = node.nodeValue;
                    text.split('').forEach(char => {
                        const span = document.createElement('span');
                        span.className = 'repel-letter';
                        span.innerHTML = char === ' ' ? '&nbsp;' : char;
                        element.appendChild(span);
                    });
                } else if (node.nodeType === 1) { // Element node (es. br, span iridescente)
                    if(node.tagName.toLowerCase() === 'br') {
                        element.appendChild(node);
                    } else {
                        // Ricorsione per gli span interni
                        const wrapperSpan = document.createElement('span');
                        wrapperSpan.className = node.className + ' repel-word'; // Mantiene le classi (es. iridescent-text)
                        splitTextIntoSpans(node); // processa il contenuto
                        Array.from(node.childNodes).forEach(child => wrapperSpan.appendChild(child));
                        element.appendChild(wrapperSpan);
                    }
                }
            });
        }
        
        splitTextIntoSpans(titleEl);
        
        // Raccogliamo tutte le lettere generate
        const letters = Array.from(document.querySelectorAll('.repel-letter')).map(el => ({
            el: el, x: 0, y: 0, targetX: 0, targetY: 0, rot: 0, targetRot: 0
        }));

        // --- 4. MOTORE FISICO UNIFICATO ---
        let time = 0;
        let cardRotX = 0; let cardRotY = 0;
        let targetCardRotX = 0; let targetCardRotY = 0;

        tiltCard.addEventListener('mouseenter', () => { isHoveringCard = true; glare.style.opacity = '1'; });
        tiltCard.addEventListener('mouseleave', () => { isHoveringCard = false; targetCardRotX = 0; targetCardRotY = 0; glare.style.opacity = '0'; });

        function renderLoop() {
            time += 0.01;

            // 4A. Disegna la scia sul canvas
            drawTrail();

            // 4B. Tilt Card 3D
            if (isHoveringCard) {
                const rect = tiltCard.getBoundingClientRect();
                const x = mouse.x - rect.left;
                const y = mouse.y - rect.top;
                const cx = rect.width / 2;
                const cy = rect.height / 2;
                
                targetCardRotX = ((y - cy) / cy) * -8; 
                targetCardRotY = ((x - cx) / cx) * 8;
                
                glare.style.setProperty('--glare-x', `${(x / rect.width) * 100}%`);
                glare.style.setProperty('--glare-y', `${(y / rect.height) * 100}%`);
            }
            cardRotX = lerp(cardRotX, targetCardRotX, 0.05);
            cardRotY = lerp(cardRotY, targetCardRotY, 0.05);
            tiltCard.style.transform = `rotateX(${cardRotX}deg) rotateY(${cardRotY}deg)`;

            // 4C. Lettere del Titolo (Repulsione Fisica)
            letters.forEach(l => {
                const rect = l.el.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2 - l.x; // ignora la traslazione attuale
                const centerY = rect.top + rect.height / 2 - l.y;
                
                const dx = mouse.x - centerX;
                const dy = mouse.y - centerY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                // Se il mouse è vicino (< 80px), la lettera "scappa"
                if (dist < 80) {
                    const push = (80 - dist) / 80;
                    l.targetX = -dx * push * 0.5; // Spinge via
                    l.targetY = -dy * push * 0.5;
                    l.targetRot = (dx > 0 ? -1 : 1) * push * 15; // Ruota leggermente
                } else {
                    l.targetX = 0; l.targetY = 0; l.targetRot = 0;
                }

                // Interpolazione elastica per il ritorno
                l.x = lerp(l.x, l.targetX, 0.1);
                l.y = lerp(l.y, l.targetY, 0.1);
                l.rot = lerp(l.rot, l.targetRot, 0.1);
                
                l.el.style.transform = `translate(${l.x}px, ${l.y}px) rotate(${l.rot}deg)`;
            });

            // 4D. Sfondi Blob Magnetici
            blobs.forEach((blob, index) => {
                const speed = parseFloat(blob.dataset.speed);
                const orbitX = Math.sin(time * speed * 2 + index) * 80;
                const orbitY = Math.cos(time * speed * 1.5 + index) * 80;

                const rect = blob.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                
                const dx = cx - mouse.x;
                const dy = cy - mouse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                let repX = 0; let repY = 0;
                if (dist < 400) {
                    const force = (400 - dist) / 400;
                    repX = (dx / dist) * force * 100;
                    repY = (dy / dist) * force * 100;
                }
                
                let currX = parseFloat(blob.dataset.currX || 0);
                let currY = parseFloat(blob.dataset.currY || 0);
                
                currX = lerp(currX, orbitX + repX, 0.05);
                currY = lerp(currY, orbitY + repY, 0.05);
                
                blob.dataset.currX = currX; blob.dataset.currY = currY;
                blob.style.transform = `translate(${currX}px, ${currY}px)`;
            });

            requestAnimationFrame(renderLoop);
        }
        renderLoop();
    </script>
</body>
</html>
